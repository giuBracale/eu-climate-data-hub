services:
  postgres:
    image: postgres:15
    container_name: climate-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: climate
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  ai-processor:
    build: ./ai-processor
    container_name: climate-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-processor/.env
  app:
    build: .
    container_name: climate-api
    depends_on:
      - postgres
      - ai-processor
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/climate
    command: sh -c "npx prisma migrate deploy && node src/index.js"
volumes:
  postgres_data: